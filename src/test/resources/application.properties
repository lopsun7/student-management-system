spring.datasource.url=jdbc:h2:mem:studentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

security.jwt.secret=student-management-test-secret-key-change-me-please-1234567890
security.jwt.expiration-minutes=60
security.demo.user.username=steven
security.demo.user.password=password123
security.demo.admin.username=admin
security.demo.admin.password=admin123

app.kafka.enabled=false
app.kafka.student-topic=student-events-test
app.kafka.student-topic-partitions=3
app.kafka.student-topic-replicas=1
app.kafka.consumer-group=student-management-events-test
spring.kafka.listener.concurrency=3

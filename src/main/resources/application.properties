spring.application.name=student-management-system

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/student_management_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.sql.init.mode=always

downstream.base-url=${DOWNSTREAM_BASE_URL:http://18.217.46.236:8080}
downstream.aggregation-path=${DOWNSTREAM_AGGREGATION_PATH:/name/aggregation}
downstream.default-name=${DOWNSTREAM_DEFAULT_NAME:Steven}

security.jwt.secret=${JWT_SECRET:student-management-local-demo-secret-key-change-me-please-1234567890}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
security.demo.user.username=${DEMO_USER_USERNAME:steven}
security.demo.user.password=${DEMO_USER_PASSWORD:password123}
security.demo.admin.username=${DEMO_ADMIN_USERNAME:admin}
security.demo.admin.password=${DEMO_ADMIN_PASSWORD:admin123}

resilience4j.retry.instances.downstreamAggregation.max-attempts=${DOWNSTREAM_RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.instances.downstreamAggregation.wait-duration=${DOWNSTREAM_RETRY_WAIT_DURATION:200ms}
resilience4j.retry.instances.downstreamAggregation.retry-exceptions=org.springframework.web.client.RestClientException
resilience4j.circuitbreaker.instances.downstreamAggregation.register-health-indicator=true
resilience4j.circuitbreaker.instances.downstreamAggregation.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.downstreamAggregation.sliding-window-size=10
resilience4j.circuitbreaker.instances.downstreamAggregation.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.downstreamAggregation.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.downstreamAggregation.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.downstreamAggregation.permitted-number-of-calls-in-half-open-state=2

async.student.core-pool-size=${ASYNC_STUDENT_CORE_POOL_SIZE:2}
async.student.max-pool-size=${ASYNC_STUDENT_MAX_POOL_SIZE:4}
async.student.queue-capacity=${ASYNC_STUDENT_QUEUE_CAPACITY:50}
async.integration.core-pool-size=${ASYNC_INTEGRATION_CORE_POOL_SIZE:1}
async.integration.max-pool-size=${ASYNC_INTEGRATION_MAX_POOL_SIZE:2}
async.integration.queue-capacity=${ASYNC_INTEGRATION_QUEUE_CAPACITY:20}

app.kafka.enabled=${KAFKA_ENABLED:false}
app.kafka.student-topic=${KAFKA_STUDENT_TOPIC:student-events}
app.kafka.student-topic-partitions=${KAFKA_STUDENT_TOPIC_PARTITIONS:3}
app.kafka.student-topic-replicas=${KAFKA_STUDENT_TOPIC_REPLICAS:3}
app.kafka.consumer-group=${KAFKA_CONSUMER_GROUP_ID:student-management-events}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=${app.kafka.consumer-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.studentmanagement.kafka
spring.kafka.listener.concurrency=${KAFKA_LISTENER_CONCURRENCY:3}

management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents,retries,retryevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true

info.app.name=Student Management System
info.app.description=Student management demo using Spring JDBC, validation, AOP, async, and actuator

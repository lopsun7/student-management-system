spring.application.name=student-management-system

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/student_management_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

app.hibernate.ddl-auto=update
app.hibernate.show-sql=true
app.hibernate.format-sql=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Student Management System
info.app.description=Student management demo using native Hibernate, validation, AOP, async, and actuator
